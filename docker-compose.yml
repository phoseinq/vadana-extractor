# Vadana Extractor bot.  Fill bot/.env first, then:  docker compose up -d --build
services:
  bot:
    # default: pull the prebuilt image (docker compose pull). build: is a fallback.
    image: ghcr.io/phoseinq/vadana-extractor:latest
    build: .
    container_name: vadana-bot
    env_file: bot/.env
    volumes:
      - cache:/app/cache          # persist the Telegram file-id cache across restarts
    restart: unless-stopped

volumes:
  cache:
